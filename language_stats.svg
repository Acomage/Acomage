    font: bold 20px sans-serif;
    fill: #1f6feb;
  }
  .label {
    font: 14px sans-serif;
    fill: #24292f;
  }
  .percent {
    font: 13px monospace;
    fill: #57606a;
  }
</style>

<rect x="0" y="0" width="500" height="200"
